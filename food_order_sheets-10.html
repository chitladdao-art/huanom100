<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หัวนม100%</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;font-size:17px;background:#fdf6ee;color:#333}
.hidden{display:none!important}

/* HEADER */
.hdr{background:#3b1f0a;color:#f5c842;text-align:center;padding:14px 10px 10px}
.hdr h1{font-size:22px;font-weight:700}
.hdr p{font-size:13px;opacity:.8;margin-top:2px}

/* CATEGORY BAR */
.cat-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:2px solid #e8d5b0;display:flex;overflow-x:auto;gap:0;padding:0}
.cat-bar::-webkit-scrollbar{height:3px}
.cat-bar::-webkit-scrollbar-thumb{background:#c8a96e}
.cat-btn{flex-shrink:0;padding:11px 16px;font-size:15px;border:none;background:none;cursor:pointer;color:#666;white-space:nowrap;border-bottom:3px solid transparent;font-family:inherit;transition:all .2s}
.cat-btn.active{color:#3b1f0a;border-bottom-color:#f5c842;font-weight:700}

/* MENU SECTION */
.section-title{background:#f5c842;color:#3b1f0a;font-size:16px;font-weight:700;padding:10px 16px;margin-top:8px;border-left:5px solid #3b1f0a}
.menu-item{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #f0e8d8;background:#fff;cursor:pointer;transition:background .15s}
.menu-item:active{background:#fdf0d8}
.menu-left{flex:1}
.menu-name{font-size:16px;font-weight:600;color:#222}
.menu-desc{font-size:13px;color:#888;margin-top:2px}
.menu-price{font-size:15px;color:#c0392b;font-weight:700;min-width:70px;text-align:right;margin-right:10px}
.add-btn{background:#3b1f0a;color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* CART BAR */
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:#3b1f0a;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:200;transform:translateY(100%);transition:transform .3s}
.cart-bar.show{transform:translateY(0)}
.cart-info{font-size:15px}
.cart-count{background:#f5c842;color:#3b1f0a;border-radius:50%;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-right:8px}
.cart-btn{background:#f5c842;color:#3b1f0a;border:none;border-radius:8px;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

/* BILL FLOAT BTN */
.bill-float{position:fixed;bottom:80px;right:18px;background:#27ae60;color:#fff;border:none;border-radius:50px;padding:12px 18px;font-size:15px;font-weight:700;cursor:pointer;z-index:199;box-shadow:0 3px 12px rgba(0,0,0,.25);font-family:inherit;display:flex;align-items:center;gap:6px}
.bill-float.no-cart{bottom:18px}

/* MODAL OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end}
.modal{background:#fff;width:100%;max-height:90vh;border-radius:20px 20px 0 0;overflow-y:auto;padding:20px}
.modal-title{font-size:18px;font-weight:700;color:#3b1f0a;margin-bottom:16px}
.opt-label{font-size:14px;font-weight:600;color:#555;margin:14px 0 8px}
.opt-grid{display:flex;flex-wrap:wrap;gap:8px}
.opt-btn{padding:9px 14px;border:2px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;font-family:inherit;transition:all .2s}
.opt-btn.sel{border-color:#3b1f0a;background:#3b1f0a;color:#fff}
.qty-row{display:flex;align-items:center;gap:16px;margin:16px 0}
.qty-btn{width:36px;height:36px;border-radius:50%;border:2px solid #3b1f0a;background:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.qty-num{font-size:20px;font-weight:700;min-width:30px;text-align:center}
.add-cart-btn{width:100%;background:#3b1f0a;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit}
.add-cart-btn:disabled{opacity:.5}
.close-btn{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:#888}

/* CART MODAL */
.cart-item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #eee}
.cart-item-info{flex:1}
.cart-item-name{font-size:15px;font-weight:600}
.cart-item-opts{font-size:13px;color:#888}
.cart-item-price{font-size:15px;color:#c0392b;font-weight:700;min-width:60px;text-align:right}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qc-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid #aaa;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.qc-btn.del{border-color:#e74c3c;color:#e74c3c}
.qc-num{font-size:15px;font-weight:700;min-width:20px;text-align:center}
.total-row{display:flex;justify-content:space-between;padding:14px 0;font-size:17px;font-weight:700}
.confirm-btn{width:100%;background:#27ae60;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.confirm-btn:disabled{opacity:.5;cursor:not-allowed}

/* SUCCESS SCREEN */
.success-sc{position:fixed;inset:0;background:#fff;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px}
.success-icon{font-size:70px}
.success-title{font-size:22px;font-weight:700;color:#27ae60}
.success-sub{font-size:15px;color:#666;text-align:center}
.success-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;margin-top:10px}
.success-btns button{padding:14px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.btn-more{background:#3b1f0a;color:#fff}
.btn-bill{background:#27ae60;color:#fff}

/* BILL SCREEN */
.bill-sc{position:fixed;inset:0;background:#fff;z-index:500;overflow-y:auto}
.bill-hdr{background:#3b1f0a;color:#f5c842;padding:16px;text-align:center}
.bill-hdr h2{font-size:20px;font-weight:700}
.bill-body{padding:16px}
.bill-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:15px}
.bill-total{display:flex;justify-content:space-between;padding:14px 0;font-size:18px;font-weight:700;border-top:2px solid #333;margin-top:8px}
.bill-close{background:#888;color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:16px;font-family:inherit}
.bill-loading{text-align:center;padding:30px;color:#888}

/* THANK YOU SCREEN */
.thanks-sc{position:fixed;inset:0;background:#fff;z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px}

/* STAFF VIEW */
.staff-hdr{background:#3b1f0a;color:#f5c842;text-align:center;padding:14px 10px 10px}
.staff-hdr h1{font-size:20px;font-weight:700}
.staff-hdr p{font-size:12px;opacity:.8}
.staff-tabs{display:flex;border-bottom:2px solid #e0c990}
.staff-tab{flex:1;padding:12px;text-align:center;font-size:15px;font-weight:600;cursor:pointer;border:none;background:none;font-family:inherit;color:#888;border-bottom:3px solid transparent}
.staff-tab.active{color:#3b1f0a;border-bottom-color:#f5c842}
.staff-body{padding:10px}

/* ORDER COLUMNS */
.col-wrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;min-height:200px}
.col-hdr{text-align:center;padding:8px;border-radius:8px;font-size:14px;font-weight:700;margin-bottom:8px}
.col-new .col-hdr{background:#fef9e7;color:#d4ac0d}
.col-doing .col-hdr{background:#fdebd0;color:#ca6f1e}
.col-done .col-hdr{background:#eafaf1;color:#1e8449}

.order-card{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.1);font-size:14px}
.oc-table{font-weight:700;font-size:15px;color:#3b1f0a}
.oc-time{font-size:12px;color:#999;margin-bottom:6px}
.oc-item{padding:2px 0;color:#444}
.oc-total{color:#c0392b;font-weight:700;margin-top:6px;font-size:15px}
.oc-btn{width:100%;margin-top:8px;border:none;border-radius:8px;padding:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-accept{background:#f39c12;color:#fff}
.btn-done{background:#27ae60;color:#fff}
.btn-print{background:#2980b9;color:#fff;margin-top:4px}

/* BILL TAB */
.bill-card{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.1)}
.bc-table{font-size:16px;font-weight:700;color:#3b1f0a;margin-bottom:4px}
.bc-item{font-size:14px;color:#555;padding:3px 0;border-bottom:1px solid #f5f5f5}
.bc-total{font-size:16px;color:#c0392b;font-weight:700;margin-top:8px}
.bc-btns{display:flex;gap:8px;margin-top:10px}
.bc-btn{flex:1;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.bc-pay{background:#27ae60;color:#fff}
.bc-print{background:#2980b9;color:#fff}

/* PRINT STYLES */
@media print {
  body > *{display:none!important}
  .print-area{display:block!important;position:fixed;inset:0;background:#fff;padding:10px;font-size:13px}
  .print-area *{display:block}
}
.print-area{display:none}
</style>
</head>

<!-- PRINT AREA (hidden, shown only when printing) -->
<div class="print-area" id="printArea"></div>

<!-- ===== CUSTOMER VIEW ===== -->
<div id="customerView">
  <div class="hdr">
    <h1>🥛 หัวนม100%</h1>
    <p id="tableLabel">กำลังโหลด...</p>
  </div>
  <div class="cat-bar" id="catBar"></div>
  <div id="menuList"></div>

  <!-- Cart bar -->
  <div class="cart-bar" id="cartBar">
    <div class="cart-info">
      <span class="cart-count" id="cartCount">0</span>
      <span id="cartLabel">รายการ</span>
    </div>
    <button class="cart-btn" onclick="openCart()">ดูตะกร้า ฿<span id="cartTotal">0</span></button>
  </div>

  <!-- Bill float button -->
  <button class="bill-float hidden" id="billFloat" onclick="showBill()">🧾 ดูบิล</button>
</div>

<!-- ===== ITEM MODAL ===== -->
<div class="overlay hidden" id="itemOverlay" onclick="closeItemModal(event)">
  <div class="modal" id="itemModal">
    <button class="close-btn" onclick="closeItemModalBtn()">✕</button>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalOpts"></div>
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <span class="qty-num" id="qtyNum">1</span>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
    <div style="text-align:right;font-size:16px;color:#c0392b;font-weight:700;margin-bottom:10px">฿<span id="modalPrice">0</span></div>
    <button class="add-cart-btn" id="addCartBtn" onclick="addToCart()">✅ เพิ่มลงตะกร้า</button>
  </div>
</div>

<!-- ===== CART MODAL ===== -->
<div class="overlay hidden" id="cartOverlay" onclick="closeCartModal(event)">
  <div class="modal" id="cartModal">
    <button class="close-btn" onclick="closeCartModalBtn()">✕</button>
    <div class="modal-title">🛒 ตะกร้าสินค้า</div>
    <div id="cartItems"></div>
    <div class="total-row">
      <span>ยอดรวม</span>
      <span>฿<span id="cartModalTotal">0</span></span>
    </div>
    <button class="confirm-btn" id="confirmBtn" onclick="submitOrder()">✅ ยืนยันสั่งอาหาร</button>
  </div>
</div>

<!-- ===== SUCCESS SCREEN ===== -->
<div class="success-sc hidden" id="successSc">
  <div class="success-icon">✅</div>
  <div class="success-title">ส่งออเดอร์แล้ว!</div>
  <div class="success-sub">พนักงานได้รับออเดอร์ของคุณแล้ว<br>กรุณารอสักครู่</div>
  <div class="success-btns">
    <button class="btn-more" onclick="backToMenu()">➕ สั่งเพิ่ม</button>
    <button class="btn-bill" onclick="showBill()">🧾 ดูบิลรวม</button>
  </div>
</div>

<!-- ===== BILL SCREEN ===== -->
<div class="bill-sc hidden" id="billSc">
  <div class="bill-hdr">
    <h2>🧾 บิลโต๊ะ <span id="billTableName"></span></h2>
    <p style="font-size:13px;opacity:.8;margin-top:4px">หัวนม100% สาขาประชาสงเคราะห์</p>
  </div>
  <div class="bill-body">
    <div id="billContent"></div>
    <button class="bill-close" onclick="closeBill()">← กลับ</button>
  </div>
</div>

<!-- ===== THANK YOU SCREEN ===== -->
<div class="thanks-sc hidden" id="thanksSc">
  <div style="font-size:70px">🙏</div>
  <div style="font-size:22px;font-weight:700;color:#27ae60">ขอบคุณที่ใช้บริการ!</div>
  <div style="font-size:15px;color:#666;text-align:center">หวังว่าจะได้พบกันใหม่นะครับ</div>
</div>

<!-- ===== STAFF VIEW ===== -->
<div id="staffView" class="hidden">
  <div class="staff-hdr">
    <h1>👨‍🍳 หน้าจอพนักงาน</h1>
    <p id="staffTime">อัปเดต --:--:--</p>
  </div>
  <div class="staff-tabs">
    <button class="staff-tab active" onclick="switchTab('orders')" id="tab-orders">📋 ออเดอร์</button>
    <button class="staff-tab" onclick="switchTab('bills')" id="tab-bills">💳 บิลโต๊ะ</button>
  </div>
  <div class="staff-body" id="ordersTab">
    <div class="col-wrap">
      <div class="col-new"><div class="col-hdr">🆕 ใหม่</div><div id="colNew"></div></div>
      <div class="col-doing"><div class="col-hdr">🔥 กำลังทำ</div><div id="colDoing"></div></div>
      <div class="col-done"><div class="col-hdr">✅ เสร็จ</div><div id="colDone"></div></div>
    </div>
  </div>
  <div class="staff-body hidden" id="billsTab">
    <div id="billsContent"></div>
  </div>
</div>

const SWEETNESS_OPTS = ['หวานปกติ 100%','หวาน 50%','หวาน 25%'];

// ============================================================
// STATE
// ============================================================
let tableNum = null;
let cart = [];
let currentItem = null;
let currentQty = 1;
let currentSelections = {};
let isStaff = false;
let staffOrders = [];

// ============================================================
// INIT
// ============================================================
window.onload = function() {
  const params = new URLSearchParams(location.search);
  if (params.has('staff')) {
    isStaff = true;
    document.getElementById('customerView').classList.add('hidden');
    document.getElementById('staffView').classList.remove('hidden');
    startStaffPolling();
  } else {
    tableNum = params.get('table') || '1';
    document.getElementById('tableLabel').textContent = 'โต๊ะ ' + tableNum;
    document.title = 'โต๊ะ ' + tableNum + ' | หัวนม100%';
    buildMenu();
    updateBillFloatVisibility();
  }
};

// ============================================================
// BUILD MENU
// ============================================================
function buildMenu() {
  const catBar = document.getElementById('catBar');
  const menuList = document.getElementById('menuList');
  catBar.innerHTML = '';
  menuList.innerHTML = '';

  CATEGORIES.forEach(function(cat, ci) {
    // Category button
    const cb = document.createElement('button');
    cb.className = 'cat-btn' + (ci === 0 ? ' active' : '');
    cb.textContent = cat.name;
    cb.onclick = function() {
      document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active');});
      cb.classList.add('active');
      const sec = document.getElementById('sec-' + cat.id);
      if (sec) sec.scrollIntoView({behavior:'smooth', block:'start'});
    };
    catBar.appendChild(cb);

    // Section
    const sec = document.createElement('div');
    sec.id = 'sec-' + cat.id;
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = cat.name;
    sec.appendChild(title);

    cat.items.forEach(function(item) {
      const row = document.createElement('div');
      row.className = 'menu-item';

      let priceText = '';
      if (item.variants) {
        const prices = item.variants.map(function(v){return v.price;});
        priceText = prices[0] === prices[prices.length-1] ? '฿' + prices[0] : '฿' + Math.min.apply(null,prices) + '+';
      } else {
        priceText = '฿' + item.price;
      }

      row.innerHTML = '<div class="menu-left"><div class="menu-name">' + item.name + '</div></div>'
        + '<span class="menu-price">' + priceText + '</span>'
        + '<button class="add-btn" aria-label="เพิ่ม">+</button>';

      row.querySelector('.add-btn').onclick = function(e) { e.stopPropagation(); openItemModal(item); };
      row.onclick = function() { openItemModal(item); };
      sec.appendChild(row);
    });

    menuList.appendChild(sec);
  });

  // Scroll spy
  window.addEventListener('scroll', function() {
    let current = 0;
    CATEGORIES.forEach(function(cat, ci) {
      const sec = document.getElementById('sec-' + cat.id);
      if (sec && sec.getBoundingClientRect().top <= 80) current = ci;
    });
    document.querySelectorAll('.cat-btn').forEach(function(b, i) {
      b.classList.toggle('active', i === current);
    });
  });
}

// ============================================================
// ITEM MODAL
// ============================================================
function openItemModal(item) {
  currentItem = item;
  currentQty = 1;
  currentSelections = {};
  document.getElementById('modalTitle').textContent = item.name;
  document.getElementById('qtyNum').textContent = '1';

  const optsDiv = document.getElementById('modalOpts');
  optsDiv.innerHTML = '';

  // Variants (ร้อน/เย็น/ปั่น or ขนาด)
  if (item.variants) {
    const lbl = document.createElement('div');
    lbl.className = 'opt-label';
    lbl.textContent = 'เลือกแบบ';
    optsDiv.appendChild(lbl);
    const grid = document.createElement('div');
    grid.className = 'opt-grid';
    item.variants.forEach(function(v, vi) {
      const btn = document.createElement('button');
      btn.className = 'opt-btn' + (vi === 0 ? ' sel' : '');
      btn.textContent = v.label + ' (฿' + v.price + ')';
      btn.onclick = function() {
        grid.querySelectorAll('.opt-btn').forEach(function(b){b.classList.remove('sel');});
        btn.classList.add('sel');
        currentSelections['variant'] = v;
        updateModalPrice();
      };
      grid.appendChild(btn);
    });
    optsDiv.appendChild(grid);
    currentSelections['variant'] = item.variants[0];
  }

  // Sweetness
  if (item.opts && item.opts.indexOf('ความหวาน') >= 0) {
    const lbl = document.createElement('div');
    lbl.className = 'opt-label';
    lbl.textContent = 'ระดับความหวาน';
    optsDiv.appendChild(lbl);
    const grid = document.createElement('div');
    grid.className = 'opt-grid';
    SWEETNESS_OPTS.forEach(function(sw, si) {
      const btn = document.createElement('button');
      btn.className = 'opt-btn' + (si === 0 ? ' sel' : '');
      btn.textContent = sw;
      btn.onclick = function() {
        grid.querySelectorAll('.opt-btn').forEach(function(b){b.classList.remove('sel');});
        btn.classList.add('sel');
        currentSelections['sweetness'] = sw;
      };
      grid.appendChild(btn);
    });
    optsDiv.appendChild(grid);
    currentSelections['sweetness'] = SWEETNESS_OPTS[0];
  }

  // Flavor options
  if (item.opts && item.flavors) {
    const optName = item.opts.find(function(o){return o !== 'ความหวาน';});
    if (optName) {
      const lbl = document.createElement('div');
      lbl.className = 'opt-label';
      lbl.textContent = optName;
      optsDiv.appendChild(lbl);
      const grid = document.createElement('div');
      grid.className = 'opt-grid';
      item.flavors.forEach(function(fl, fi) {
        const btn = document.createElement('button');
        btn.className = 'opt-btn' + (fi === 0 ? ' sel' : '');
        btn.textContent = fl;
        btn.onclick = function() {
          grid.querySelectorAll('.opt-btn').forEach(function(b){b.classList.remove('sel');});
          btn.classList.add('sel');
          currentSelections['flavor'] = fl;
        };
        grid.appendChild(btn);
      });
      optsDiv.appendChild(grid);
      currentSelections['flavor'] = item.flavors[0];
    }
  }

  updateModalPrice();
  document.getElementById('itemOverlay').classList.remove('hidden');
}

function updateModalPrice() {
  const item = currentItem;
  let price = item.price || 0;
  if (item.variants && currentSelections['variant']) {
    price = currentSelections['variant'].price;
  }
  document.getElementById('modalPrice').textContent = (price * currentQty);
}

function changeQty(d) {
  currentQty = Math.max(1, Math.min(10, currentQty + d));
  document.getElementById('qtyNum').textContent = currentQty;
  updateModalPrice();
}

function closeItemModal(e) {
  if (e.target === document.getElementById('itemOverlay')) closeItemModalBtn();
}
function closeItemModalBtn() {
  document.getElementById('itemOverlay').classList.add('hidden');
}

function addToCart() {
  const item = currentItem;
  let price = item.price || 0;
  let label = item.name;
  const opts = [];

  if (item.variants && currentSelections['variant']) {
    price = currentSelections['variant'].price;
    opts.push(currentSelections['variant'].label + ' (฿' + price + ')');
  }
  if (currentSelections['sweetness']) opts.push(currentSelections['sweetness']);
  if (currentSelections['flavor']) opts.push(currentSelections['flavor']);

  cart.push({name: label, opts: opts, price: price, qty: currentQty});
  closeItemModalBtn();
  updateCartBar();
  updateBillFloatVisibility();
}

// ============================================================
// CART
// ============================================================
function updateCartBar() {
  const total = cart.reduce(function(s,i){return s + i.price*i.qty;}, 0);
  const count = cart.reduce(function(s,i){return s + i.qty;}, 0);
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = total;
  const bar = document.getElementById('cartBar');
  if (count > 0) bar.classList.add('show'); else bar.classList.remove('show');
}

function updateBillFloatVisibility() {
  const btn = document.getElementById('billFloat');
  if (!btn) return;
  const cartVisible = cart.length > 0;
  btn.classList.remove('hidden');
  btn.classList.toggle('no-cart', !cartVisible);
  if (cartVisible) btn.style.bottom = '80px'; else btn.style.bottom = '18px';
}

function openCart() {
  renderCartItems();
  document.getElementById('cartOverlay').classList.remove('hidden');
}
function closeCartModal(e) {
  if (e.target === document.getElementById('cartOverlay')) closeCartModalBtn();
}
function closeCartModalBtn() {
  document.getElementById('cartOverlay').classList.add('hidden');
}

function renderCartItems() {
  const div = document.getElementById('cartItems');
  div.innerHTML = '';
  let total = 0;
  cart.forEach(function(item, idx) {
    total += item.price * item.qty;
    const row = document.createElement('div');
    row.className = 'cart-item-row';
    row.innerHTML = '<div class="cart-item-info">'
      + '<div class="cart-item-name">' + item.name + '</div>'
      + '<div class="cart-item-opts">' + (item.opts.length ? '[' + item.opts.join(', ') + ']' : '') + '</div>'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:6px">'
      + '<div class="qty-ctrl">'
      + '<button class="qc-btn" onclick="cartChangeQty(' + idx + ',-1)">−</button>'
      + '<span class="qc-num">' + item.qty + '</span>'
      + '<button class="qc-btn" onclick="cartChangeQty(' + idx + ',1)">+</button>'
      + '</div>'
      + '<button class="qc-btn del" onclick="cartRemove(' + idx + ')">✕</button>'
      + '</div>'
      + '<div class="cart-item-price">฿' + (item.price * item.qty) + '</div>';
    div.appendChild(row);
  });
  document.getElementById('cartModalTotal').textContent = total;
}

function cartChangeQty(idx, d) {
  cart[idx].qty = Math.max(1, cart[idx].qty + d);
  renderCartItems();
  updateCartBar();
}
function cartRemove(idx) {
  cart.splice(idx, 1);
  renderCartItems();
  updateCartBar();
  if (cart.length === 0) closeCartModalBtn();
}

// ============================================================
// SUBMIT ORDER
// ============================================================
function submitOrder() {
  if (cart.length === 0) return;
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังส่ง...';
  closeCartModalBtn();

  const total = cart.reduce(function(s,i){return s + i.price*i.qty;}, 0);
  fetch(SCRIPT_URL, {
    method:'POST',
    body: JSON.stringify({table: tableNum, items: cart, total: total})
  }).then(function() {
    cart = [];
    updateCartBar();
    updateBillFloatVisibility();
    document.getElementById('successSc').classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = '✅ ยืนยันสั่งอาหาร';
  }).catch(function() {
    btn.disabled = false;
    btn.textContent = '✅ ยืนยันสั่งอาหาร';
    alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
  });
}

function backToMenu() {
  document.getElementById('successSc').classList.add('hidden');
}

// ============================================================
// BILL (CUSTOMER)
// ============================================================
function showBill() {
  document.getElementById('successSc').classList.add('hidden');
  document.getElementById('billSc').classList.remove('hidden');
  document.getElementById('billTableName').textContent = tableNum;
  const content = document.getElementById('billContent');
  content.innerHTML = '<div class="bill-loading">⏳ กำลังโหลด...</div>';

  fetch(SCRIPT_URL + '?action=getOrders&t=' + Date.now())
    .then(function(r){return r.json();})
    .then(function(orders) {
      const tableKey = 'โต๊ะ ' + tableNum;
      const mine = orders.filter(function(o){
        return o.table === tableKey && o.status !== 'จ่ายแล้ว';
      });
      if (mine.length === 0) {
        content.innerHTML = '<p style="text-align:center;color:#888;padding:30px">ไม่มีออเดอร์</p>';
        return;
      }
      let html = '';
      let grandTotal = 0;
      mine.forEach(function(o) {
        const items = Array.isArray(o.items) ? o.items : [];
        items.forEach(function(it) {
          const lineTotal = it.price * it.qty;
          grandTotal += lineTotal;
          const optStr = it.opts && it.opts.length ? ' [' + it.opts.join(', ') + ']' : '';
          html += '<div class="bill-row"><span>' + it.name + optStr + ' ×' + it.qty + '</span><span>฿' + lineTotal + '</span></div>';
        });
      });
      html += '<div class="bill-total"><span>ยอดรวมทั้งหมด</span><span style="color:#c0392b">฿' + grandTotal + '</span></div>';
      content.innerHTML = html;

      // Poll for payment
      startBillPoll();
    })
    .catch(function() {
      content.innerHTML = '<p style="text-align:center;color:#c0392b;padding:30px">โหลดไม่ได้ กรุณาลองใหม่</p>';
    });
}

let billPollTimer = null;
function startBillPoll() {
  if (billPollTimer) clearInterval(billPollTimer);
  billPollTimer = setInterval(function() {
    const tableKey = 'โต๊ะ ' + tableNum;
    fetch(SCRIPT_URL + '?action=checkPaid&table=' + encodeURIComponent(tableKey) + '&t=' + Date.now())
      .then(function(r){return r.json();})
      .then(function(d) {
        if (d.paid) {
          clearInterval(billPollTimer);
          document.getElementById('billSc').classList.add('hidden');
          document.getElementById('thanksSc').classList.remove('hidden');
        }
      }).catch(function(){});
  }, 5000);
}

function closeBill() {
  if (billPollTimer) clearInterval(billPollTimer);
  document.getElementById('billSc').classList.add('hidden');
}

// ============================================================
function switchTab(tab) {
  document.getElementById('ordersTab').classList.toggle('hidden', tab !== 'orders');
  document.getElementById('billsTab').classList.toggle('hidden', tab !== 'bills');
  document.getElementById('tab-orders').classList.toggle('active', tab === 'orders');
  document.getElementById('tab-bills').classList.toggle('active', tab === 'bills');
  if (tab === 'bills') renderBillsTab();
}

function startStaffPolling() {
  loadStaffOrders();
  setInterval(loadStaffOrders, 8000);
}

function loadStaffOrders() {
  fetch(SCRIPT_URL + '?action=getOrders&t=' + Date.now())
    .then(function(r){return r.json();})
    .then(function(orders) {
      staffOrders = orders;
      renderOrderColumns();
      renderBillsTab();
      document.getElementById('staffTime').textContent = 'อัปเดต ' + new Date().toLocaleTimeString('th-TH');
    }).catch(function(){});
}

function renderOrderColumns() {
  const colNew = document.getElementById('colNew');
  const colDoing = document.getElementById('colDoing');
  const colDone = document.getElementById('colDone');
  colNew.innerHTML = '';
  colDoing.innerHTML = '';
  colDone.innerHTML = '';

  const active = staffOrders.filter(function(o){return o.status !== 'จ่ายแล้ว';});
  active.forEach(function(o) {
    const card = buildOrderCard(o);
    if (o.status === 'ใหม่') colNew.appendChild(card);
    else if (o.status === 'กำลังทำ') colDoing.appendChild(card);
    else colDone.appendChild(card);
  });
}

function buildOrderCard(o) {
  const div = document.createElement('div');
  div.className = 'order-card';
  const items = Array.isArray(o.items) ? o.items : [];
  let itemsHtml = items.map(function(it) {
    const optStr = it.opts && it.opts.length ? ' [' + it.opts.join(', ') + ']' : '';
    return '<div class="oc-item">• ' + it.name + optStr + ' ×' + it.qty + '</div>';
  }).join('');

  let btnHtml = '';
  if (o.status === 'ใหม่') {
    btnHtml = '<button class="oc-btn btn-accept" onclick="updateStatus(\'' + o.id + '\',\'กำลังทำ\')">🔥 รับออเดอร์</button>';
  } else if (o.status === 'กำลังทำ') {
    btnHtml = '<button class="oc-btn btn-done" onclick="updateStatus(\'' + o.id + '\',\'เสร็จ\')">✅ เสร็จแล้ว</button>';
  }

  div.innerHTML = '<div class="oc-table">' + o.table + '</div>'
    + '<div class="oc-time">' + o.timestamp + '</div>'
    + itemsHtml
    + '<div class="oc-total">฿' + o.total + '</div>'
    + btnHtml
    + '<button class="oc-btn btn-print" onclick="printOrder(' + JSON.stringify(o).replace(/'/g,'') + ')">🖨️ ปริ้นออเดอร์</button>';
  return div;
}

function updateStatus(id, status) {
  fetch(SCRIPT_URL + '?action=updateStatus&orderId=' + id + '&status=' + encodeURIComponent(status))
    .then(function(){loadStaffOrders();})
    .catch(function(){});
}

// ============================================================
// BILLS TAB
// ============================================================
function renderBillsTab() {
  const div = document.getElementById('billsContent');
  const active = staffOrders.filter(function(o){return o.status !== 'จ่ายแล้ว';});

  // Group by table
  const tables = {};
  active.forEach(function(o) {
    if (!tables[o.table]) tables[o.table] = [];
    tables[o.table].push(o);
  });

  const keys = Object.keys(tables);
  if (keys.length === 0) {
    div.innerHTML = '<p style="text-align:center;color:#888;padding:30px">ไม่มีออเดอร์ที่ค้างอยู่</p>';
    return;
  }

  div.innerHTML = '';
  keys.forEach(function(tableKey) {
    const orders = tables[tableKey];
    const card = document.createElement('div');
    card.className = 'bill-card';

    let allItems = [];
    orders.forEach(function(o) {
      const items = Array.isArray(o.items) ? o.items : [];
      allItems = allItems.concat(items.map(function(it){ return {name:it.name, opts:it.opts, price:it.price, qty:it.qty}; }));
    });

    const grandTotal = allItems.reduce(function(s,it){return s + it.price*it.qty;}, 0);
    const itemsHtml = allItems.map(function(it) {
      const optStr = it.opts && it.opts.length ? ' [' + it.opts.join(', ') + ']' : '';
      return '<div class="bc-item">' + it.name + optStr + ' ×' + it.qty + ' = ฿' + (it.price*it.qty) + '</div>';
    }).join('');

    card.innerHTML = '<div class="bc-table">' + tableKey + '</div>'
      + itemsHtml
      + '<div class="bc-total">ยอดรวม ฿' + grandTotal + '</div>'
      + '<div class="bc-btns">'
      + '<button class="bc-btn bc-pay" onclick="markPaid(\'' + tableKey + '\')">💳 รับชำระแล้ว</button>'
      + '<button class="bc-btn bc-print" onclick="printBill(\'' + tableKey + '\',' + grandTotal + ')">🖨️ ปริ้นบิล</button>'
      + '</div>';
    div.appendChild(card);
  });
}

function markPaid(tableKey) {
  if (!confirm('ยืนยันรับชำระเงิน ' + tableKey + '?')) return;
  fetch(SCRIPT_URL + '?action=markPaid&table=' + encodeURIComponent(tableKey))
    .then(function(){loadStaffOrders();})
    .catch(function(){});
}

// ============================================================
// PRINT FUNCTIONS
// ============================================================
function printOrder(order) {
  const items = Array.isArray(order.items) ? order.items : [];
  const now = new Date().toLocaleString('th-TH');
  let content = '<div style="font-family:monospace;font-size:14px;padding:10px;max-width:300px">';
  content += '<div style="text-align:center;font-size:16px;font-weight:bold;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:8px">หัวนม100%<br>สาขาประชาสงเคราะห์</div>';
  content += '<div style="margin-bottom:6px"><b>' + order.table + '</b></div>';
  content += '<div style="font-size:12px;color:#555;margin-bottom:8px">' + order.timestamp + '</div>';
  content += '<div style="border-top:1px dashed #000;padding-top:8px">';
  items.forEach(function(it) {
    const optStr = it.opts && it.opts.length ? '\n  [' + it.opts.join(', ') + ']' : '';
    content += '<div style="margin-bottom:4px">' + it.name + optStr + '</div>';
    content += '<div style="display:flex;justify-content:space-between"><span>×' + it.qty + '</span><span>฿' + (it.price*it.qty) + '</span></div>';
  });
  content += '</div>';
  content += '<div style="border-top:2px solid #000;margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-size:16px;font-weight:bold"><span>รวม</span><span>฿' + order.total + '</span></div>';
  content += '</div>';

  doPrint(content);
}

function printBill(tableKey, grandTotal) {
  const active = staffOrders.filter(function(o){return o.table === tableKey && o.status !== 'จ่ายแล้ว';});
  let allItems = [];
  active.forEach(function(o) {
    const items = Array.isArray(o.items) ? o.items : [];
    allItems = allItems.concat(items);
  });

  const now = new Date().toLocaleString('th-TH');
  let content = '<div style="font-family:monospace;font-size:14px;padding:10px;max-width:300px">';
  content += '<div style="text-align:center;font-size:16px;font-weight:bold;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:8px">หัวนม100%<br>สาขาประชาสงเคราะห์<br><span style="font-size:14px">ใบเสร็จ / บิล</span></div>';
  content += '<div style="margin-bottom:6px"><b>' + tableKey + '</b></div>';
  content += '<div style="font-size:12px;color:#555;margin-bottom:8px">' + now + '</div>';
  content += '<div style="border-top:1px dashed #000;padding-top:8px">';
  allItems.forEach(function(it) {
    const optStr = it.opts && it.opts.length ? ' [' + it.opts.join(', ') + ']' : '';
    content += '<div style="margin-bottom:6px"><div>' + it.name + optStr + '</div><div style="display:flex;justify-content:space-between"><span>×' + it.qty + '</span><span>฿' + (it.price*it.qty) + '</span></div></div>';
  });
  content += '</div>';
  content += '<div style="border-top:2px solid #000;margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-size:16px;font-weight:bold"><span>ยอดรวม</span><span>฿' + grandTotal + '</span></div>';
  content += '<div style="text-align:center;margin-top:16px;font-size:13px">ขอบคุณที่ใช้บริการ 🙏</div>';
  content += '</div>';

  doPrint(content);
}

function doPrint(content) {
  // Method 1: Try using a new window (works on desktop and Sunmi browser)
  const w = window.open('', '_blank', 'width=400,height=600');
  if (w) {
    w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8">'
      + '<style>body{margin:0;padding:0} @media print{body{margin:0}}</style>'
      + '</head><body>' + content + '<script>window.onload=function(){window.print();window.close();}<\/script></body></html>');
    w.document.close();
  } else {
    // Fallback: print from iframe
    let iframe = document.getElementById('printFrame');
    if (!iframe) {
      iframe = document.createElement('iframe');
      iframe.id = 'printFrame';
      iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none';
      document.body.appendChild(iframe);
    }
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:0;font-family:monospace}</style></head><body>' + content + '</body></html>');
    doc.close();
    setTimeout(function() {
      iframe.contentWindow.focus();
      iframe.contentWindow.print();
    }, 300);
  }
}
