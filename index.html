<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หัวนม100%</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;font-size:17px;background:#fdf6ee;color:#333}
.hidden{display:none!important}
.hdr{background:#3b1f0a;color:#f5c842;text-align:center;padding:14px 10px 10px}
.hdr h1{font-size:22px;font-weight:700}
.hdr p{font-size:13px;opacity:.8;margin-top:2px}
.cat-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:2px solid #e8d5b0;display:flex;overflow-x:auto;gap:0;padding:0}
.cat-bar::-webkit-scrollbar{height:3px}
.cat-bar::-webkit-scrollbar-thumb{background:#c8a96e}
.cat-btn{flex-shrink:0;padding:11px 16px;font-size:15px;border:none;background:none;cursor:pointer;color:#666;white-space:nowrap;border-bottom:3px solid transparent;font-family:inherit;transition:all .2s}
.cat-btn.active{color:#3b1f0a;border-bottom-color:#f5c842;font-weight:700}
.section-title{background:#f5c842;color:#3b1f0a;font-size:16px;font-weight:700;padding:10px 16px;margin-top:8px;border-left:5px solid #3b1f0a}
.menu-item{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #f0e8d8;background:#fff;cursor:pointer;transition:background .15s}
.menu-item:active{background:#fdf0d8}
.menu-left{flex:1}
.menu-name{font-size:16px;font-weight:600;color:#222}
.menu-desc{font-size:13px;color:#888;margin-top:2px}
.menu-price{font-size:15px;color:#c0392b;font-weight:700;min-width:70px;text-align:right;margin-right:10px}
.add-btn{background:#3b1f0a;color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:#3b1f0a;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:200;transform:translateY(100%);transition:transform .3s}
.cart-bar.show{transform:translateY(0)}
.cart-info{font-size:15px}
.cart-count{background:#f5c842;color:#3b1f0a;border-radius:50%;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-right:8px}
.cart-btn{background:#f5c842;color:#3b1f0a;border:none;border-radius:8px;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.bill-float{position:fixed;right:18px;background:#27ae60;color:#fff;border:none;border-radius:50px;padding:12px 18px;font-size:15px;font-weight:700;cursor:pointer;z-index:199;box-shadow:0 3px 12px rgba(0,0,0,.25);font-family:inherit}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end}
.modal{background:#fff;width:100%;max-height:90vh;border-radius:20px 20px 0 0;overflow-y:auto;padding:20px}
.modal-title{font-size:18px;font-weight:700;color:#3b1f0a;margin-bottom:16px}
.opt-label{font-size:14px;font-weight:600;color:#555;margin:14px 0 8px}
.opt-grid{display:flex;flex-wrap:wrap;gap:8px}
.opt-btn{padding:9px 14px;border:2px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;font-family:inherit;transition:all .2s}
.opt-btn.sel{border-color:#3b1f0a;background:#3b1f0a;color:#fff}
.qty-row{display:flex;align-items:center;gap:16px;margin:16px 0}
.qty-btn{width:36px;height:36px;border-radius:50%;border:2px solid #3b1f0a;background:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.qty-num{font-size:20px;font-weight:700;min-width:30px;text-align:center}
.add-cart-btn{width:100%;background:#3b1f0a;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit}
.close-btn{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:#888}
.cart-item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #eee}
.cart-item-info{flex:1}
.cart-item-name{font-size:15px;font-weight:600}
.cart-item-opts{font-size:13px;color:#888}
.cart-item-price{font-size:15px;color:#c0392b;font-weight:700;min-width:60px;text-align:right}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qc-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid #aaa;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.qc-btn.del{border-color:#e74c3c;color:#e74c3c}
.qc-num{font-size:15px;font-weight:700;min-width:20px;text-align:center}
.total-row{display:flex;justify-content:space-between;padding:14px 0;font-size:17px;font-weight:700}
.confirm-btn{width:100%;background:#27ae60;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.confirm-btn:disabled{opacity:.5;cursor:not-allowed}
.success-sc{position:fixed;inset:0;background:#fff;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px}
.bill-sc{position:fixed;inset:0;background:#fff;z-index:500;overflow-y:auto}
.bill-hdr{background:#3b1f0a;color:#f5c842;padding:16px;text-align:center}
.bill-hdr h2{font-size:20px;font-weight:700}
.bill-body{padding:16px}
.bill-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:15px}
.bill-total{display:flex;justify-content:space-between;padding:14px 0;font-size:18px;font-weight:700;border-top:2px solid #333;margin-top:8px}
.bill-close{background:#888;color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:16px;font-family:inherit}
.thanks-sc{position:fixed;inset:0;background:#fff;z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px}
.staff-hdr{background:#3b1f0a;color:#f5c842;text-align:center;padding:14px 10px 10px}
.staff-hdr h1{font-size:20px;font-weight:700}
.staff-hdr p{font-size:12px;opacity:.8}
.staff-tabs{display:flex;border-bottom:2px solid #e0c990}
.staff-tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;border:none;background:none;font-family:inherit;color:#888;border-bottom:3px solid transparent}
.staff-tab.active{color:#3b1f0a;border-bottom-color:#f5c842}
.staff-body{padding:10px}
.col-wrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;min-height:200px}
.col-hdr{text-align:center;padding:8px;border-radius:8px;font-size:14px;font-weight:700;margin-bottom:8px}
.col-new .col-hdr{background:#fef9e7;color:#d4ac0d}
.col-doing .col-hdr{background:#fdebd0;color:#ca6f1e}
.col-done .col-hdr{background:#eafaf1;color:#1e8449}
.order-card{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.1);font-size:14px}
.oc-table{font-weight:700;font-size:15px;color:#3b1f0a}
.oc-time{font-size:12px;color:#999;margin-bottom:6px}
.oc-item{padding:2px 0;color:#444}
.oc-total{color:#c0392b;font-weight:700;margin-top:6px;font-size:15px}
.oc-btn{width:100%;margin-top:8px;border:none;border-radius:8px;padding:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-accept{background:#f39c12;color:#fff}
.btn-done{background:#27ae60;color:#fff}
.btn-print{background:#2980b9;color:#fff;margin-top:4px}
.bill-card{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.1)}
.bc-table{font-size:16px;font-weight:700;color:#3b1f0a;margin-bottom:4px}
.bc-item{font-size:14px;color:#555;padding:3px 0;border-bottom:1px solid #f5f5f5}
.bc-total{font-size:16px;color:#c0392b;font-weight:700;margin-top:8px}
.bc-btns{display:flex;gap:8px;margin-top:10px}
.bc-btn{flex:1;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.bc-pay{background:#27ae60;color:#fff}
.bc-print{background:#2980b9;color:#fff}
.sale-card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.1)}
.sale-card.today{background:#fef9e7;border:2px solid #f5c842}

@media print{#printOverlay > div:first-child{display:none!important}}
</style>
</head>
<body>

<div id="customerView">
  <div class="hdr">
    <h1>🥛 หัวนม100%</h1>
    <p id="tableLabel">กำลังโหลด...</p>
  </div>
  <div class="cat-bar" id="catBar"></div>
  <div id="menuList"></div>
  <div class="cart-bar" id="cartBar">
    <div class="cart-info">
      <span class="cart-count" id="cartCount">0</span>
      <span>รายการ</span>
    </div>
    <button class="cart-btn" onclick="openCart()">ดูตะกร้า ฿<span id="cartTotal">0</span></button>
  </div>
  <button class="bill-float hidden" id="billFloat" onclick="showBill()">🧾 ดูบิล</button>
</div>

<div class="overlay hidden" id="itemOverlay" onclick="closeItemModal(event)">
  <div class="modal" id="itemModal">
    <button class="close-btn" onclick="closeItemModalBtn()">✕</button>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalOpts"></div>
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <span class="qty-num" id="qtyNum">1</span>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
    <div style="text-align:right;font-size:16px;color:#c0392b;font-weight:700;margin-bottom:10px">฿<span id="modalPrice">0</span></div>
    <button class="add-cart-btn" onclick="addToCart()">✅ เพิ่มลงตะกร้า</button>
  </div>
</div>

<div class="overlay hidden" id="cartOverlay" onclick="closeCartModal(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeCartModalBtn()">✕</button>
    <div class="modal-title">🛒 ตะกร้าสินค้า</div>
    <div id="cartItems"></div>
    <div class="total-row">
      <span>ยอดรวม</span>
      <span>฿<span id="cartModalTotal">0</span></span>
    </div>
    <button class="confirm-btn" id="confirmBtn" onclick="submitOrder()">✅ ยืนยันสั่งอาหาร</button>
  </div>
</div>

<div class="success-sc hidden" id="successSc">
  <div style="font-size:70px">✅</div>
  <div style="font-size:22px;font-weight:700;color:#27ae60">ส่งออเดอร์แล้ว!</div>
  <div style="font-size:15px;color:#666;text-align:center">พนักงานได้รับออเดอร์ของคุณแล้ว</div>
  <div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;margin-top:10px">
    <button onclick="backToMenu()" style="padding:14px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;border:none;background:#3b1f0a;color:#fff;font-family:inherit">➕ สั่งเพิ่ม</button>
    <button onclick="showBill()" style="padding:14px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;border:none;background:#27ae60;color:#fff;font-family:inherit">🧾 ดูบิลรวม</button>
  </div>
</div>

<div class="bill-sc hidden" id="billSc">
  <div class="bill-hdr">
    <h2>🧾 บิลโต๊ะ <span id="billTableName"></span></h2>
    <p style="font-size:13px;opacity:.8;margin-top:4px">หัวนม100% สาขาประชาสงเคราะห์</p>
  </div>
  <div class="bill-body">
    <div id="billContent"></div>
    <button class="bill-close" onclick="closeBill()">← กลับ</button>
  </div>
</div>

<div class="thanks-sc hidden" id="thanksSc">
  <div style="font-size:70px">🙏</div>
  <div style="font-size:22px;font-weight:700;color:#27ae60">ขอบคุณที่ใช้บริการ!</div>
  <div style="font-size:15px;color:#666;text-align:center">หวังว่าจะได้พบกันใหม่นะครับ</div>
</div>

<div id="staffView" class="hidden">
  <div class="staff-hdr">
    <h1>👨‍🍳 หน้าจอพนักงาน</h1>
    <p id="staffTime">อัปเดต --:--:--</p>
  </div>
  <div class="staff-tabs">
    <button class="staff-tab active" onclick="switchTab('orders')" id="tab-orders">📋 ออเดอร์</button>
    <button class="staff-tab" onclick="switchTab('bills')" id="tab-bills">💳 บิลโต๊ะ</button>
    <button class="staff-tab" onclick="switchTab('sales')" id="tab-sales">📊 ยอดขาย</button>
  </div>
  <div class="staff-body" id="ordersTab">
    <div class="col-wrap">
      <div class="col-new"><div class="col-hdr">🆕 ใหม่</div><div id="colNew"></div></div>
      <div class="col-doing"><div class="col-hdr">🔥 กำลังทำ</div><div id="colDoing"></div></div>
      <div class="col-done"><div class="col-hdr">✅ เสร็จ</div><div id="colDone"></div></div>
    </div>
  </div>
  <div class="staff-body hidden" id="billsTab">
    <div id="billsContent"></div>
  </div>
  <div class="staff-body hidden" id="salesTab">
    <div id="salesContent"></div>
  </div>
</div>

function thaiTime(ts) {
  if (!ts) return '';
  if (/^\d{2}\/\d{2}\/\d{4}/.test(String(ts))) return String(ts);
  try {
    var d = new Date(ts);
    if (isNaN(d.getTime())) return String(ts);
    var t = new Date(d.getTime() + 7*60*60*1000);
    return pad(t.getUTCDate())+'/'+pad(t.getUTCMonth()+1)+'/'+t.getUTCFullYear()+' '+pad(t.getUTCHours())+':'+pad(t.getUTCMinutes());
  } catch(e) { return String(ts); }
}
function pad(n){ return String(n).padStart(2,'0'); }

window.onload = function() {
  var p = new URLSearchParams(location.search);
  if (p.has('staff')) {
    document.getElementById('customerView').classList.add('hidden');
    document.getElementById('staffView').classList.remove('hidden');
    startStaffPolling();
  } else {
    tableNum = p.get('table') || '1';
    document.getElementById('tableLabel').textContent = 'โต๊ะ ' + tableNum;
    document.title = 'โต๊ะ ' + tableNum + ' | หัวนม100%';
    buildMenu();
    showBillFloat();
  }
};

function buildMenu() {
  var catBar = document.getElementById('catBar');
  var menuList = document.getElementById('menuList');
  catBar.innerHTML = ''; menuList.innerHTML = '';
  CATEGORIES.forEach(function(cat, ci) {
    var cb = document.createElement('button');
    cb.className = 'cat-btn' + (ci===0?' active':'');
    cb.textContent = cat.emoji + ' ' + cat.name;
    cb.onclick = function() {
      document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active');});
      cb.classList.add('active');
      var sec = document.getElementById('sec-'+cat.id);
      if(sec) sec.scrollIntoView({behavior:'smooth',block:'start'});
    };
    catBar.appendChild(cb);
    var sec = document.createElement('div');
    sec.id = 'sec-'+cat.id;
    var title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = cat.emoji + ' ' + cat.name;
    sec.appendChild(title);
    cat.items.forEach(function(item) {
      var row = document.createElement('div');
      row.className = 'menu-item';
      var priceText = item.variants ? '฿'+Math.min.apply(null,item.variants.map(function(v){return v.price;}))+'+ ' : '฿'+item.price;
      var imgSrc = ITEM_IMAGES[item.id] || SVG_IMAGES[item.id] || '';
      var imgHtml = imgSrc ? '<img src="'+imgSrc+'" style="width:56px;height:56px;object-fit:cover;border-radius:8px;margin-right:10px;flex-shrink:0">' : '';
      row.innerHTML = imgHtml+'<div class="menu-left"><div class="menu-name">'+item.name+'</div></div>'
        +'<span class="menu-price">'+priceText+'</span>'
        +'<button class="add-btn">+</button>';
      row.querySelector('.add-btn').onclick = function(e){e.stopPropagation();openItemModal(item);};
      row.onclick = function(){openItemModal(item);};
      sec.appendChild(row);
    });
    menuList.appendChild(sec);
  });
}

function showBillFloat() {
  var btn = document.getElementById('billFloat');
  btn.classList.remove('hidden');
  btn.style.bottom = cart.length > 0 ? '80px' : '18px';
}

function openItemModal(item) {
  currentItem = item; currentQty = 1; currentSel = {};
  document.getElementById('modalTitle').textContent = item.name;
  document.getElementById('qtyNum').textContent = '1';
  // Show item image in modal
  var existImg = document.getElementById('modalImg');
  if(existImg) existImg.remove();
  var modalImg = document.createElement('img');
  modalImg.id = 'modalImg';
  modalImg.style.cssText = 'width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:12px;display:none';
  if(ITEM_IMAGES[item.id]) {
    modalImg.src = ITEM_IMAGES[item.id];
    modalImg.style.display = 'block';
  }
  document.getElementById('itemModal').insertBefore(modalImg, document.getElementById('modalTitle'));
  var optsDiv = document.getElementById('modalOpts');
  optsDiv.innerHTML = '';
  if (item.variants) {
    addOptGroup(optsDiv, 'เลือกแบบ', item.variants.map(function(v){return v.label+' (฿'+v.price+')';}), function(i){ currentSel.variant = item.variants[i]; updateModalPrice(); }, 0);
    currentSel.variant = item.variants[0];
  }
  if (item.sweet) {
    addOptGroup(optsDiv, 'ระดับความหวาน', SWEETNESS, function(i){ currentSel.sweet = SWEETNESS[i]; }, 0);
    currentSel.sweet = SWEETNESS[0];
  }
  if (item.flavors) {
    addOptGroup(optsDiv, item.flavorLabel || 'รสชาติ', item.flavors, function(i){
      currentSel.flavor = item.flavors[i];
      // Update modal image if flavor image available
      var fi = document.getElementById('modalImg');
      if(fi && FLAVOR_IMAGES[item.id] && FLAVOR_IMAGES[item.id][item.flavors[i]]) {
        fi.src = FLAVOR_IMAGES[item.id][item.flavors[i]];
        fi.style.display = 'block';
      } else if(fi && ITEM_IMAGES[item.id]) {
        fi.src = ITEM_IMAGES[item.id];
        fi.style.display = 'block';
      }
    }, 0);
    currentSel.flavor = item.flavors[0];
  }
  // Note
  if (item.note) {
    var noteDiv = document.createElement('div');
    noteDiv.style.cssText = 'background:#fff8e1;border:1px solid #f5c842;border-radius:8px;padding:8px 12px;font-size:13px;color:#856404;margin-top:10px';
    noteDiv.textContent = 'ℹ️ ' + item.note;
    optsDiv.appendChild(noteDiv);
  }
  // Addons (เช่น เพิ่มชีส)
  if (item.addons && item.addons.length) {
    var aLbl = document.createElement('div'); aLbl.className='opt-label'; aLbl.textContent='ส่วนเพิ่ม (ไม่บังคับ)'; optsDiv.appendChild(aLbl);
    currentSel.addons = [];
    item.addons.forEach(function(addon) {
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0e8d8';
      var left = document.createElement('span');
      left.style.cssText = 'font-size:15px';
      left.textContent = addon.name + ' (+฿' + addon.price + ')';
      var toggle = document.createElement('button');
      toggle.style.cssText = 'width:32px;height:32px;border-radius:50%;border:2px solid #ddd;background:#fff;font-size:18px;cursor:pointer;font-family:inherit';
      toggle.textContent = '+';
      var active = false;
      toggle.onclick = function() {
        active = !active;
        toggle.style.background = active ? '#3b1f0a' : '#fff';
        toggle.style.color = active ? '#fff' : '#000';
        toggle.style.borderColor = active ? '#3b1f0a' : '#ddd';
        toggle.textContent = active ? '✓' : '+';
        if(active) currentSel.addons.push(addon);
        else currentSel.addons = currentSel.addons.filter(function(a){return a.name!==addon.name;});
        updateModalPrice();
      };
      row.appendChild(left); row.appendChild(toggle);
      optsDiv.appendChild(row);
    });
  }
  updateModalPrice();
  document.getElementById('itemOverlay').classList.remove('hidden');
}

function addOptGroup(parent, label, options, onSelect, defaultIdx) {
  var lbl = document.createElement('div'); lbl.className = 'opt-label'; lbl.textContent = label; parent.appendChild(lbl);
  var grid = document.createElement('div'); grid.className = 'opt-grid';
  options.forEach(function(opt, i) {
    var btn = document.createElement('button');
    btn.className = 'opt-btn' + (i===defaultIdx?' sel':'');
    btn.textContent = opt;
    btn.onclick = function() { grid.querySelectorAll('.opt-btn').forEach(function(b){b.classList.remove('sel');}); btn.classList.add('sel'); onSelect(i); };
    grid.appendChild(btn);
  });
  parent.appendChild(grid);
}

function updateModalPrice() {
  var price = currentItem.price || 0;
  if (currentItem.variants && currentSel.variant) price = currentSel.variant.price;
  // Override price if flavor has price in parentheses e.g. "ผักขม (89฿)"
  if (currentSel.flavor) {
    var raw = String(currentSel.flavor);
    var m = raw.match(/\((\d+)/);
    if (m) price = parseInt(m[1]);
  }
  var addonTotal = (currentSel.addons||[]).reduce(function(s,a){return s+a.price;},0);
  document.getElementById('modalPrice').textContent = (price + addonTotal) * currentQty;
}
function changeQty(d) { currentQty = Math.max(1,Math.min(10,currentQty+d)); document.getElementById('qtyNum').textContent = currentQty; updateModalPrice(); }
function closeItemModal(e) { if(e.target===document.getElementById('itemOverlay')) closeItemModalBtn(); }
function closeItemModalBtn() { document.getElementById('itemOverlay').classList.add('hidden'); }

function addToCart() {
  var price = currentItem.price || 0;
  var opts = [];
  if (currentSel.variant) { price = currentSel.variant.price; opts.push(currentSel.variant.label+' (฿'+price+')'); }
  if (currentSel.sweet) opts.push(currentSel.sweet);
  if (currentSel.flavor) {
    opts.push(currentSel.flavor);
    var raw2 = String(currentSel.flavor);
    var mf = raw2.match(/\((\d+)/);
    if (mf) price = parseInt(mf[1]);
  }
  var addonTotal = 0;
  (currentSel.addons||[]).forEach(function(a){ opts.push(a.name+' (+฿'+a.price+')'); addonTotal+=a.price; });
  price = price + addonTotal;
  cart.push({name:currentItem.name, opts:opts, price:price, qty:currentQty});
  closeItemModalBtn();
  updateCartBar();
  showBillFloat();
}

function updateCartBar() {
  var total = cart.reduce(function(s,i){return s+i.price*i.qty;},0);
  var count = cart.reduce(function(s,i){return s+i.qty;},0);
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = total;
  var bar = document.getElementById('cartBar');
  if(count>0) bar.classList.add('show'); else bar.classList.remove('show');
}

function openCart() { renderCartItems(); document.getElementById('cartOverlay').classList.remove('hidden'); }
function closeCartModal(e) { if(e.target===document.getElementById('cartOverlay')) closeCartModalBtn(); }
function closeCartModalBtn() { document.getElementById('cartOverlay').classList.add('hidden'); }

function renderCartItems() {
  var div = document.getElementById('cartItems'); div.innerHTML = '';
  var total = 0;
  cart.forEach(function(item, idx) {
    total += item.price*item.qty;
    var row = document.createElement('div'); row.className = 'cart-item-row';
    row.innerHTML = '<div class="cart-item-info"><div class="cart-item-name">'+item.name+'</div><div class="cart-item-opts">'+(item.opts.length?'['+item.opts.join(', ')+']':'')+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:6px"><div class="qty-ctrl">'
      +'<button class="qc-btn" onclick="cartQty('+idx+',-1)">−</button>'
      +'<span class="qc-num">'+item.qty+'</span>'
      +'<button class="qc-btn" onclick="cartQty('+idx+',1)">+</button>'
      +'</div><button class="qc-btn del" onclick="cartRm('+idx+')">✕</button></div>'
      +'<div class="cart-item-price">฿'+(item.price*item.qty)+'</div>';
    div.appendChild(row);
  });
  document.getElementById('cartModalTotal').textContent = total;
}

function cartQty(idx,d){cart[idx].qty=Math.max(1,cart[idx].qty+d);renderCartItems();updateCartBar();}
function cartRm(idx){cart.splice(idx,1);renderCartItems();updateCartBar();if(cart.length===0)closeCartModalBtn();}

function submitOrder() {
  if(!cart.length) return;
  var btn = document.getElementById('confirmBtn');
  btn.disabled = true; btn.textContent = 'กำลังส่ง...';
  closeCartModalBtn();
  var total = cart.reduce(function(s,i){return s+i.price*i.qty;},0);
  fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({table:tableNum,items:cart,total:total})})
    .then(function(){
      cart=[]; updateCartBar(); showBillFloat();
      document.getElementById('successSc').classList.remove('hidden');
      btn.disabled=false; btn.textContent='✅ ยืนยันสั่งอาหาร';
    }).catch(function(){
      btn.disabled=false; btn.textContent='✅ ยืนยันสั่งอาหาร';
      alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
    });
}
function backToMenu(){document.getElementById('successSc').classList.add('hidden');}

function showBill() {
  document.getElementById('successSc').classList.add('hidden');
  document.getElementById('billSc').classList.remove('hidden');
  document.getElementById('billTableName').textContent = tableNum;
  var content = document.getElementById('billContent');
  content.innerHTML = '<div style="text-align:center;padding:30px;color:#888">กำลังโหลด...</div>';
  fetch(SCRIPT_URL+'?action=getOrders&t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(orders){
      var mine = orders.filter(function(o){return o.table==='โต๊ะ '+tableNum && o.status!=='จ่ายแล้ว';});
      if(!mine.length){content.innerHTML='<p style="text-align:center;color:#888;padding:30px">ไม่มีออเดอร์</p>';return;}
      var html='',grand=0;
      mine.forEach(function(o){
        var items=Array.isArray(o.items)?o.items:[];
        items.forEach(function(it){
          var lt=it.price*it.qty; grand+=lt;
          var os=it.opts&&it.opts.length?' ['+it.opts.join(', ')+']':'';
          html+='<div class="bill-row"><span>'+it.name+os+' x'+it.qty+'</span><span>฿'+lt+'</span></div>';
        });
      });
      html+='<div class="bill-total"><span>ยอดรวมทั้งหมด</span><span style="color:#c0392b">฿'+grand+'</span></div>';
      content.innerHTML=html;
      startBillPoll();
    }).catch(function(){content.innerHTML='<p style="text-align:center;color:#c0392b;padding:30px">โหลดไม่ได้ กรุณาลองใหม่</p>';});
}

var billTimer=null;
function startBillPoll(){
  if(billTimer) clearInterval(billTimer);
  billTimer=setInterval(function(){
    fetch(SCRIPT_URL+'?action=checkPaid&table='+encodeURIComponent('โต๊ะ '+tableNum)+'&t='+Date.now())
      .then(function(r){return r.json();})
      .then(function(d){if(d.paid){clearInterval(billTimer);document.getElementById('billSc').classList.add('hidden');document.getElementById('thanksSc').classList.remove('hidden');}})
      .catch(function(){});
  },5000);
}
function closeBill(){if(billTimer)clearInterval(billTimer);document.getElementById('billSc').classList.add('hidden');}

// STAFF
function switchTab(tab){
  ['orders','bills','sales'].forEach(function(t){
    document.getElementById(t+'Tab').classList.toggle('hidden',t!==tab);
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='bills') renderBillsTab();
  if(tab==='sales') renderSalesTab();
}

function startStaffPolling(){loadStaff();setInterval(loadStaff,8000);}

function loadStaff(){
  fetch(SCRIPT_URL+'?action=getOrders&t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(orders){
      staffOrders=orders;
      renderOrderColumns();
      document.getElementById('staffTime').textContent='อัปเดต '+new Date().toLocaleTimeString('th-TH');
    }).catch(function(){});
}

function renderOrderColumns(){
  var cn=document.getElementById('colNew'),cd=document.getElementById('colDoing'),ce=document.getElementById('colDone');
  cn.innerHTML='';cd.innerHTML='';ce.innerHTML='';
  staffOrders.filter(function(o){return o.status!=='จ่ายแล้ว';}).forEach(function(o){
    var card=buildCard(o);
    if(o.status==='ใหม่') cn.appendChild(card);
    else if(o.status==='กำลังทำ') cd.appendChild(card);
    else ce.appendChild(card);
  });
}

function buildCard(o){
  var div=document.createElement('div'); div.className='order-card';
  var items=Array.isArray(o.items)?o.items:[];
  var itemsHtml=items.map(function(it){
    var os=it.opts&&it.opts.length?' ['+it.opts.join(', ')+']':'';
    return '<div class="oc-item">• '+it.name+os+' x'+it.qty+'</div>';
  }).join('');
  var btnHtml='';
  if(o.status==='ใหม่') btnHtml='<button class="oc-btn btn-accept" onclick="updateStatus(\''+o.id+'\',\'กำลังทำ\')">🔥 รับออเดอร์</button>';
  else if(o.status==='กำลังทำ') btnHtml='<button class="oc-btn btn-done" onclick="updateStatus(\''+o.id+'\',\'เสร็จ\')">✅ เสร็จแล้ว</button>';
  div.innerHTML='<div class="oc-table">'+o.table+'</div><div class="oc-time">'+thaiTime(o.timestamp)+'</div>'+itemsHtml+'<div class="oc-total">฿'+o.total+'</div>'+btnHtml;
  var pb=document.createElement('button'); pb.className='oc-btn btn-print'; pb.textContent='🖨️ ปริ้นออเดอร์';
  pb.onclick=function(){printOrder(o);};
  div.appendChild(pb);
  return div;
}

function updateStatus(id,status){
  fetch(SCRIPT_URL+'?action=updateStatus&orderId='+id+'&status='+encodeURIComponent(status))
    .then(function(){loadStaff();}).catch(function(){});
}

function renderBillsTab(){
  var div=document.getElementById('billsContent');
  var active=staffOrders.filter(function(o){return o.status!=='จ่ายแล้ว';});
  var tables={};
  active.forEach(function(o){if(!tables[o.table])tables[o.table]=[];tables[o.table].push(o);});
  var keys=Object.keys(tables);
  if(!keys.length){div.innerHTML='<p style="text-align:center;color:#888;padding:30px">ไม่มีออเดอร์ค้างอยู่</p>';return;}
  div.innerHTML='';
  keys.forEach(function(tk){
    var orders=tables[tk];
    var allItems=[];
    orders.forEach(function(o){var items=Array.isArray(o.items)?o.items:[];allItems=allItems.concat(items);});
    var grand=allItems.reduce(function(s,it){return s+it.price*it.qty;},0);
    var card=document.createElement('div'); card.className='bill-card';
    var ih=allItems.map(function(it){var os=it.opts&&it.opts.length?' ['+it.opts.join(', ')+']':'';return '<div class="bc-item">'+it.name+os+' x'+it.qty+' = ฿'+(it.price*it.qty)+'</div>';}).join('');
    card.innerHTML='<div class="bc-table">'+tk+'</div>'+ih+'<div class="bc-total">ยอดรวม ฿'+grand+'</div><div class="bc-btns"></div>';
    var btns=card.querySelector('.bc-btns');
    var payBtn=document.createElement('button'); payBtn.className='bc-btn bc-pay'; payBtn.textContent='💳 รับชำระแล้ว';
    payBtn.onclick=function(){markPaid(tk);};
    var printBtn=document.createElement('button'); printBtn.className='bc-btn bc-print'; printBtn.textContent='🖨️ ปริ้นบิล';
    printBtn.onclick=function(){printBill(tk,grand,allItems);};
    btns.appendChild(payBtn); btns.appendChild(printBtn);
    div.appendChild(card);
  });
}

function markPaid(tk){
  if(!confirm('ยืนยันรับชำระเงิน '+tk+'?')) return;
  fetch(SCRIPT_URL+'?action=markPaid&table='+encodeURIComponent(tk)).then(function(){loadStaff();}).catch(function(){});
}

function renderSalesTab(){
  var div=document.getElementById('salesContent');
  div.innerHTML='<div style="text-align:center;padding:20px;color:#888">กำลังโหลด...</div>';
  Promise.all([
    fetch(SCRIPT_URL+'?action=getOrders&t='+Date.now()).then(function(r){return r.json();}).catch(function(){return [];}),
    fetch(SCRIPT_URL+'?action=getHistory&t='+Date.now()).then(function(r){return r.json();}).catch(function(){return [];})
  ]).then(function(results){
    var orders=(results[0]||[]).concat(results[1]||[]);
    buildSalesUI(div, orders);
  }).catch(function(){
    div.innerHTML='<p style="text-align:center;color:#c0392b;padding:30px">โหลดไม่ได้</p>';
  });
}

function buildSalesUI(div, orders){
  // Group by date
  var byDate={};
  orders.forEach(function(o){
    var ts=String(o.timestamp||'');
    var dk='';
    if(/^\d{2}\/\d{2}\/\d{4}/.test(ts)) dk=ts.substring(0,10);
    else{try{var d=new Date(ts);var t=new Date(d.getTime()+7*60*60*1000);dk=pad(t.getUTCDate())+'/'+pad(t.getUTCMonth()+1)+'/'+t.getUTCFullYear();}catch(e){dk='ไม่ระบุ';}}
    if(!dk) dk='ไม่ระบุ';
    if(!byDate[dk]) byDate[dk]={total:0,count:0};
    byDate[dk].total+=Number(o.total)||0;
    byDate[dk].count++;
  });

  var now=new Date();
  var tn=new Date(now.getTime()+7*60*60*1000);
  var todayKey=pad(tn.getUTCDate())+'/'+pad(tn.getUTCMonth()+1)+'/'+tn.getUTCFullYear();

  var keys=Object.keys(byDate).sort(function(a,b){
    var pa=a.split('/'),pb=b.split('/');
    return new Date(pb[2],pb[1]-1,pb[0])-new Date(pa[2],pa[1]-1,pa[0]);
  });

  // Get current filter
  var filter = div.getAttribute('data-filter') || 'day';

  // Filter keys based on selection
  var filteredKeys = keys.filter(function(k){
    if(filter==='day') return k===todayKey;
    var pa=k.split('/');
    var kDate=new Date(pa[2],pa[1]-1,pa[0]);
    if(filter==='week'){
      var weekAgo=new Date(tn.getTime()-7*24*60*60*1000);
      weekAgo=new Date(weekAgo.getUTCFullYear(),weekAgo.getUTCMonth(),weekAgo.getUTCDate());
      return kDate>=weekAgo;
    }
    if(filter==='month'){
      return kDate.getFullYear()===tn.getUTCFullYear() && kDate.getMonth()===tn.getUTCMonth();
    }
    return true;
  });

  // Calc summary total
  var sumTotal=0, sumCount=0;
  filteredKeys.forEach(function(k){sumTotal+=byDate[k].total;sumCount+=byDate[k].count;});

  // Build HTML
  var html2='';

  // Filter buttons
  html2+='<div style="display:flex;gap:8px;margin-bottom:14px">';
  var filters=[
    {id:'day',label:'📅 วันนี้'},
    {id:'week',label:'📆 สัปดาห์นี้'},
    {id:'month',label:'🗓️ เดือนนี้'},
    {id:'all',label:'📊 ทั้งหมด'}
  ];
  filters.forEach(function(f){
    var active=filter===f.id;
    html2+='<button onclick="setSalesFilter(\''+f.id+'\')" style="flex:1;padding:8px 4px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:'+(active?'#3b1f0a':'#f0e8d8')+';color:'+(active?'#f5c842':'#3b1f0a')+'">'+f.label+'</button>';
  });
  html2+='</div>';

  // Summary card
  html2+='<div style="background:linear-gradient(135deg,#3b1f0a,#6d3a1a);border-radius:14px;padding:18px;margin-bottom:14px;color:#fff;text-align:center">';
  html2+='<div style="font-size:13px;opacity:.8;margin-bottom:4px">ยอดรวม</div>';
  html2+='<div style="font-size:32px;font-weight:700;color:#f5c842">฿'+sumTotal.toLocaleString()+'</div>';
  html2+='<div style="font-size:13px;opacity:.8;margin-top:6px">'+sumCount+' ออเดอร์</div>';
  html2+='</div>';

  // Daily breakdown (show only if not "day" filter)
  if(filteredKeys.length===0){
    html2+='<p style="text-align:center;color:#888;padding:20px">ไม่มีข้อมูลช่วงนี้</p>';
  } else if(filter!=='day'){
    filteredKeys.forEach(function(k){
      var d=byDate[k];
      var isToday=k===todayKey;
      html2+='<div style="background:'+(isToday?'#fef9e7':'#fff')+';border:'+(isToday?'2px solid #f5c842':'1px solid #eee')+';border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">';
      html2+='<div><div style="font-size:14px;font-weight:700;color:#3b1f0a">'+(isToday?'📅 ':'')+k+'</div><div style="font-size:12px;color:#888;margin-top:2px">'+d.count+' ออเดอร์</div></div>';
      html2+='<div style="font-size:18px;font-weight:700;color:#27ae60">฿'+d.total.toLocaleString()+'</div>';
      html2+='</div>';
    });
  } else {
    // Day view - show big and clear
    var k=filteredKeys[0];
    var d=byDate[k];
    html2+='<div style="background:#fff;border-radius:10px;padding:14px;border:1px solid #eee">';
    html2+='<div style="font-size:13px;color:#888;margin-bottom:8px">รายละเอียดวันนี้</div>';
    html2+='<div style="display:flex;justify-content:space-between"><span>จำนวนออเดอร์</span><span style="font-weight:700">'+d.count+' รายการ</span></div>';
    html2+='<div style="display:flex;justify-content:space-between;margin-top:6px"><span>ยอดขายรวม</span><span style="font-weight:700;color:#27ae60">฿'+d.total.toLocaleString()+'</span></div>';
    html2+='</div>';
  }

  // Print button
  html2+='<button onclick="printSalesSummary(\''+filter+'\','+sumTotal+','+sumCount+')" style="width:100%;background:#2980b9;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px">🖨️ ปริ้นสรุปยอด</button>';

  div.innerHTML=html2;
  div.setAttribute('data-filter', filter);
}

function setSalesFilter(f){
  var div=document.getElementById('salesContent');
  div.setAttribute('data-filter',f);
  renderSalesTab();
}

function printSalesSummary(period, total, count){
  var labels={'day':'วันนี้','week':'สัปดาห์นี้','month':'เดือนนี้','all':'ทั้งหมด'};
  var now=new Date();var t=new Date(now.getTime()+7*60*60*1000);
  var ts=pad(t.getUTCDate())+'/'+pad(t.getUTCMonth()+1)+'/'+t.getUTCFullYear()+' '+pad(t.getUTCHours())+':'+pad(t.getUTCMinutes())+' น.';
  var c='<div style="font-family:monospace;font-size:14px;padding:10px;max-width:300px;text-align:center">';
  c+='<div style="font-size:16px;font-weight:bold;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:8px">หัวนม100%<br>สาขาประชาสงเคราะห์</div>';
  c+='<div style="font-size:14px;font-weight:bold">สรุปยอดขาย: '+(labels[period]||period)+'</div>';
  c+='<div style="border-top:1px dashed #000;border-bottom:1px dashed #000;padding:10px 0;margin:10px 0;text-align:left">';
  c+='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>จำนวนออเดอร์</span><span>'+count+' รายการ</span></div>';
  c+='<div style="display:flex;justify-content:space-between;font-size:16px;font-weight:bold;margin-top:6px"><span>ยอดรวม</span><span>฿'+total.toLocaleString()+'</span></div>';
  c+='</div>';
  c+='<div style="font-size:12px;color:#555">พิมพ์เมื่อ '+ts+'</div>';
  c+='<div style="margin-top:10px">ขอบคุณ 🙏</div></div>';
  doPrint(c);
}

function printOrder(o){
  var items=Array.isArray(o.items)?o.items:[];
  var c='<div style="font-family:monospace;font-size:14px;padding:10px;max-width:300px">';
  c+='<div style="text-align:center;font-size:16px;font-weight:bold;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:8px">หัวนม100%<br>สาขาประชาสงเคราะห์</div>';
  c+='<div style="font-weight:bold">'+o.table+'</div><div style="font-size:12px;color:#555;margin-bottom:8px">'+thaiTime(o.timestamp)+'</div>';
  c+='<div style="border-top:1px dashed #000;padding-top:8px">';
  items.forEach(function(it){
    var os=it.opts&&it.opts.length?' ['+it.opts.join(', ')+']':'';
    c+='<div style="margin-bottom:4px">'+it.name+os+'</div><div style="display:flex;justify-content:space-between"><span>x'+it.qty+'</span><span>฿'+(it.price*it.qty)+'</span></div>';
  });
  c+='</div><div style="border-top:2px solid #000;margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-size:16px;font-weight:bold"><span>รวม</span><span>฿'+o.total+'</span></div></div>';
  doPrint(c);
}

function printBill(tk,grand,allItems){
  var now=new Date();var t=new Date(now.getTime()+7*60*60*1000);
  var ts=pad(t.getUTCDate())+'/'+pad(t.getUTCMonth()+1)+'/'+t.getUTCFullYear()+' '+pad(t.getUTCHours())+':'+pad(t.getUTCMinutes());
  var c='<div style="font-family:monospace;font-size:14px;padding:10px;max-width:300px;text-align:center">';
  c+='<div style="font-size:16px;font-weight:bold;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:8px">หัวนม100%<br>สาขาประชาสงเคราะห์<br><span style="font-size:13px">ใบเสร็จ</span></div>';
  c+='<div style="text-align:left"><div style="font-weight:bold">'+tk+'</div><div style="font-size:12px;color:#555;margin-bottom:8px">'+ts+'</div>';
  c+='<div style="border-top:1px dashed #000;padding-top:8px">';
  allItems.forEach(function(it){var os=it.opts&&it.opts.length?' ['+it.opts.join(', ')+']':'';c+='<div style="margin-bottom:6px"><div>'+it.name+os+'</div><div style="display:flex;justify-content:space-between"><span>x'+it.qty+'</span><span>฿'+(it.price*it.qty)+'</span></div></div>';});
  c+='</div></div><div style="border-top:2px solid #000;margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-size:16px;font-weight:bold"><span>ยอดรวม</span><span>฿'+grand+'</span></div>';
  c+='<div style="text-align:center;margin-top:12px;font-size:13px">ขอบคุณที่ใช้บริการ</div></div>';
  doPrint(c);
}

function printDailySales(dateKey,total,count){
  var now=new Date();var t=new Date(now.getTime()+7*60*60*1000);
  var ts=pad(t.getUTCHours())+':'+pad(t.getUTCMinutes())+' น.';
  var c='<div style="font-family:monospace;font-size:14px;padding:10px;max-width:300px;text-align:center">';
  c+='<div style="font-size:16px;font-weight:bold;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:8px">หัวนม100%<br>สาขาประชาสงเคราะห์</div>';
  c+='<div style="font-size:14px;font-weight:bold">สรุปยอดขายประจำวัน</div>';
  c+='<div style="font-size:13px;margin-bottom:12px">วันที่: '+dateKey+'</div>';
  c+='<div style="border-top:1px dashed #000;border-bottom:1px dashed #000;padding:10px 0;margin:8px 0;text-align:left">';
  c+='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>จำนวนออเดอร์</span><span>'+count+' รายการ</span></div>';
  c+='<div style="display:flex;justify-content:space-between;font-size:16px;font-weight:bold;margin-top:8px"><span>ยอดรวมทั้งหมด</span><span>฿'+total+'</span></div>';
  c+='</div><div style="font-size:12px;color:#555;margin-top:8px">พิมพ์เมื่อ '+ts+'</div>';
  c+='<div style="margin-top:12px;font-size:13px">ขอบคุณ</div></div>';
  doPrint(c);
}

function doPrint(content){
  var ov=document.getElementById('printOv');
  if(!ov){
    ov=document.createElement('div');
    ov.id='printOv';
    ov.style.cssText='position:fixed;inset:0;background:#fff;z-index:9999;overflow-y:auto;padding:16px';
    document.body.appendChild(ov);
  }
  var btnBar=document.createElement('div');
  btnBar.id='printBtnBar';
  btnBar.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #eee';
  var printBtn=document.createElement('button');
  printBtn.textContent='🖨️ พิมพ์';
  printBtn.style.cssText='background:#3b1f0a;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit';
  printBtn.onclick=function(){window.print();};
  var closeBtn=document.createElement('button');
  closeBtn.textContent='✕ ปิด';
  closeBtn.style.cssText='background:#888;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit';
  closeBtn.onclick=function(){ov.style.display='none';};
  btnBar.appendChild(printBtn);
  btnBar.appendChild(closeBtn);
  var contentDiv=document.createElement('div');
  contentDiv.id='printContent';
  contentDiv.innerHTML=content;
  ov.innerHTML='';
  ov.appendChild(btnBar);
  ov.appendChild(contentDiv);
  ov.style.display='block';
}
</script>
