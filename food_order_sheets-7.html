function getItem(id) { for(var i=0;i<MENU.length;i++) if(MENU[i].id===id) return MENU[i]; return null; }

window.onload = function() {
  var p = new URLSearchParams(window.location.search);
  table = p.get('table')||'';
  var isStaff = p.get('staff')==='1';
  if(isStaff){ document.getElementById('tabBar').style.display='none'; showTab('s'); }
  else if(table){ document.getElementById('tabBar').style.display='none'; showTab('c'); }
  document.getElementById('tbadge').textContent = table ? 'โต๊ะ '+table : 'โต๊ะ —';
  document.getElementById('sheetUrl').value = API;
  document.getElementById('qrSec').style.display = 'block';
  renderMenus();
};

function showTab(t) {
  document.getElementById('cView').style.display = t==='c'?'block':'none';
  document.getElementById('staffView').style.display = t==='s'?'block':'none';
  document.getElementById('setupView').style.display = t==='x'?'block':'none';
  var bs = document.querySelectorAll('.tab-btn');
  var ts = ['c','s','x'];
  for(var i=0;i<bs.length;i++) bs[i].classList.toggle('active', ts[i]===t);
  if(t==='s') startPoll(); else stopPoll();
}

function renderMenus() {
  var nav = document.getElementById('catnav'), mc = document.getElementById('menuCont');
  var nh='', mh='';
  for(var i=0;i<CATS.length;i++) {
    var c = CATS[i];
    nh += '<button class="catbtn'+(i===0?' active':'')+'" onclick="gocat(\''+c.k+'\')" id="nb_'+c.k+'">'+c.e+' '+c.k+'</button>';
    mh += '<div class="sec-title" id="cat_'+c.k+'">'+c.e+' '+c.k+'</div><div class="mgrid">';
    for(var j=0;j<c.ids.length;j++) {
      var item = getItem(c.ids[j]);
      if(!item) continue;
      var pd = item.variants ? item.variants[0].price+'฿ขึ้นไป' : (item.price||0)+'฿';
      mh += '<div class="mcard" onclick="openOpt(\''+item.id+'\')"><div class="memoji">'+item.emoji+'</div><div class="minfo"><div class="mname">'+item.name+'</div><div class="mprice">'+pd+'</div></div><div class="qbadge" id="qb_'+item.id+'">0</div><div class="marrow">›</div></div>';
    }
    mh += '</div>';
  }
  nav.innerHTML = nh; mc.innerHTML = mh;
  window.onscroll = function() {
    var cur=CATS[0].k;
    for(var i=0;i<CATS.length;i++){ var el=document.getElementById('cat_'+CATS[i].k); if(el&&el.getBoundingClientRect().top<=100) cur=CATS[i].k; }
    var bs=document.querySelectorAll('.catbtn'); for(var b=0;b<bs.length;b++) bs[b].classList.remove('active');
    var ab=document.getElementById('nb_'+cur); if(ab){ ab.classList.add('active'); ab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
  };
}

function gocat(k) {
  var el=document.getElementById('cat_'+k); if(el) window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-90,behavior:'smooth'});
  var bs=document.querySelectorAll('.catbtn'); for(var b=0;b<bs.length;b++) bs[b].classList.remove('active');
  var ab=document.getElementById('nb_'+k); if(ab) ab.classList.add('active');
}

function openOpt(id) {
  var item=getItem(id); if(!item) return;
  curItem=item; selOpts={}; iqty=1; document.getElementById('iqty').textContent='1';
  document.getElementById('optTitle').textContent=item.name;
  var h='';
  if(item.variants) {
    h+='<div class="optgrp"><div class="optgrp-title">เลือกแบบ <span style="color:#c0392b">*</span></div><div class="optchoices">';
    for(var v=0;v<item.variants.length;v++) h+='<button class="optbtn" onclick="selOpt(\'แบบ\',\''+item.variants[v].label+' ('+item.variants[v].price+'฿)\',this)">'+item.variants[v].label+' — '+item.variants[v].price+'฿</button>';
    h+='</div></div>';
  }
  if(item.options) for(var o=0;o<item.options.length;o++) {
    var opt=item.options[o];
    h+='<div class="optgrp"><div class="optgrp-title">'+opt.group+(opt.required?' <span style="color:#c0392b">*</span>':'')+'</div><div class="optchoices">';
    for(var ch=0;ch<opt.choices.length;ch++) h+='<button class="optbtn" onclick="selOpt(\''+opt.group+'\',\''+opt.choices[ch]+'\',this)">'+opt.choices[ch]+'</button>';
    h+='</div></div>';
  }
  document.getElementById('optGrps').innerHTML=h;
  document.getElementById('optOv').classList.add('open');
}

function selOpt(g,c,btn) {
  selOpts[g]=c;
  var sibs=btn.closest('.optchoices').querySelectorAll('.optbtn');
  for(var i=0;i<sibs.length;i++) sibs[i].classList.remove('sel');
  btn.classList.add('sel');
}

function chQty(d) { iqty=Math.max(1,Math.min(10,iqty+d)); document.getElementById('iqty').textContent=iqty; }
function closeOpt() { document.getElementById('optOv').classList.remove('open'); curItem=null; selOpts={}; }

function cfmOpt() {
  if(!curItem) return;
  var req=[];
  if(curItem.variants) req.push('แบบ');
  if(curItem.options) for(var i=0;i<curItem.options.length;i++) if(curItem.options[i].required) req.push(curItem.options[i].group);
  for(var r=0;r<req.length;r++) if(!selOpts[req[r]]) { alert('กรุณาเลือก: '+req[r]); return; }
  var optStr=Object.values(selOpts).join(', ');
  var key=curItem.id+'_'+optStr.replace(/[^\w\u0E00-\u0E7F]/g,'_');
  var price=curItem.price||0;
  if(curItem.variants&&selOpts['แบบ']) { var m=selOpts['แบบ'].match(/\((\d+)฿\)/); if(m) price=parseInt(m[1]); }
  if(!cart[key]) cart[key]={qty:0,price:price,name:curItem.name,options:optStr};
  cart[key].qty+=iqty;
  var tot=0; for(var k in cart) if(k.indexOf(curItem.id+'_')===0) tot+=cart[k].qty;
  var qb=document.getElementById('qb_'+curItem.id);
  if(qb){ qb.textContent=tot; qb.style.display=tot>0?'flex':'none'; }
  updCart(); closeOpt();
}

function updCart() {
  var cnt=0,tot=0; for(var k in cart){ cnt+=cart[k].qty; tot+=cart[k].qty*cart[k].price; }
  document.getElementById('ccount').textContent=cnt;
  document.getElementById('ctotal').textContent=tot;
  document.getElementById('cartbar').classList.toggle('visible',cnt>0);
}

function openOrder() {
  if(!Object.keys(cart).length) return;
  renderOrder(); document.getElementById('orderOv').classList.add('open');
}

function closeOrder() { document.getElementById('orderOv').classList.remove('open'); }

function renderOrder() {
  var keys=Object.keys(cart), h='', tot=0;
  for(var i=0;i<keys.length;i++) {
    var k=keys[i], item=cart[k], sub=item.qty*item.price;
    h+='<div class="oitem">';
    h+='<div class="oitem-info"><div class="oitem-name">'+item.name+'</div>';
    if(item.options) h+='<div class="oitem-opt">'+item.options+'</div>';
    h+='<div class="oitem-price">'+sub+' บาท</div></div>';
    h+='<div class="oitem-ctrl">';
    h+='<button class="oedit m" data-key="'+encodeURIComponent(k)+'" data-act="-1" onclick="doEdit(this)">−</button>';
    h+='<span class="oqty">'+item.qty+'</span>';
    h+='<button class="oedit p" data-key="'+encodeURIComponent(k)+'" data-act="1" onclick="doEdit(this)">+</button>';
    h+='<button class="oedit d" data-key="'+encodeURIComponent(k)+'" data-act="0" onclick="doEdit(this)">✕</button>';
    h+='</div></div>';
    tot+=sub;
  }
  document.getElementById('oItems').innerHTML=h;
  document.getElementById('oTotal').textContent=tot+' บาท';
}

function doEdit(btn) {
  var k=decodeURIComponent(btn.getAttribute('data-key'));
  var act=parseInt(btn.getAttribute('data-act'));
  editItem(k, act);
}

function editItem(key,act) {
  if(!cart[key]) return;
  if(act===0) delete cart[key];
  else { cart[key].qty+=act; if(cart[key].qty<=0) delete cart[key]; }
  updAllBadges(); updCart();
  if(!Object.keys(cart).length) closeOrder(); else renderOrder();
}

function updAllBadges() {
  var bs=document.querySelectorAll('.qbadge'); for(var i=0;i<bs.length;i++){bs[i].textContent='0';bs[i].style.display='none';}
  for(var k in cart) {
    var id=k.split('_')[0], el=document.getElementById('qb_'+id);
    if(el){ var cur=parseInt(el.textContent)||0; el.textContent=cur+cart[k].qty; el.style.display='flex'; }
  }
}

async function submitOrder() {
  if(!API){ alert('ยังไม่ได้ตั้งค่า URL'); return; }
  closeOrder();
  document.getElementById('sendSc').classList.add('show');
  var items=[]; for(var k in cart) items.push({name:cart[k].name,qty:cart[k].qty,price:cart[k].price,options:cart[k].options||''});
  var tot=0; for(var i=0;i<items.length;i++) tot+=items[i].qty*items[i].price;
  try {
    await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({table:table||'?',items:items,total:tot})});
    document.getElementById('sendSc').classList.remove('show');
    document.getElementById('successMsg').textContent='ออเดอร์โต๊ะ '+(table||'?')+' ส่งแล้ว! กรุณารอสักครู่';
    document.getElementById('successSc').classList.add('show');
  } catch(e){ document.getElementById('sendSc').classList.remove('show'); alert('เกิดข้อผิดพลาด กรุณาลองใหม่'); }
}

function resetOrder() {
  cart={};
  var bs=document.querySelectorAll('.qbadge'); for(var i=0;i<bs.length;i++){bs[i].textContent='0';bs[i].style.display='none';}
  updCart(); document.getElementById('successSc').classList.remove('show');
}

function fmtTime(ts) {

async function loadOrders() {
  try {
    var res=await fetch(API+'?action=getOrders'), orders=await res.json();
    var byS={'ใหม่':[],'กำลังทำ':[],'เสร็จ':[]};
    for(var i=0;i<orders.length;i++) if(byS[orders[i].status]!==undefined) byS[orders[i].status].push(orders[i]);
    // เรียงเสร็จแล้วใหม่ล่าสุดอยู่บนสุด
    byS['เสร็จ'].sort(function(a,b){ return Number(b.id) - Number(a.id); });
    document.getElementById('oNew').innerHTML=renderCards(byS['ใหม่'],'กำลังทำ','🔥 รับออเดอร์','sbtn-do');
    document.getElementById('oDo').innerHTML=renderCards(byS['กำลังทำ'],'เสร็จ','✅ เสร็จแล้ว','sbtn-done');
    document.getElementById('oDone').innerHTML=byS['เสร็จ'].length?renderCards(byS['เสร็จ'],null,'',''):'<div class="empty">ว่าง</div>';
    var nc=byS['ใหม่'].length; if(nc>lastNew) playAlert(); lastNew=nc;
    document.getElementById('stStatus').textContent='อัปเดต '+new Date().toLocaleTimeString('th-TH');
  } catch(e){ document.getElementById('stStatus').textContent='โหลดไม่ได้'; }
}

function renderCards(orders,nxt,lbl,cls) {
  if(!orders.length) return '<div class="empty">ว่าง</div>';
  var h='';
  for(var i=0;i<orders.length;i++) {
    var o=orders[i], it='';
    if(o.items) for(var j=0;j<o.items.length;j++) it+=(j>0?'<br>':'')+'• '+o.items[j].name+(o.items[j].options?' ['+o.items[j].options+']':'')+' x'+o.items[j].qty;
    h+='<div class="ocard"><div class="ocard-table">'+o.table+'</div><div class="ocard-time">'+fmtTime(o.timestamp)+'</div><div class="ocard-items">'+it+'</div><div class="ocard-price">฿'+o.total+'</div>';
    if(nxt) h+='<button class="sbtn '+cls+'" onclick="updStatus(\''+o.id+'\',\''+nxt+'\')">'+lbl+'</button>';
    h+='</div>';
  }
  return h;
}

async function saveTest() {
  var url=document.getElementById('sheetUrl').value.trim(); if(!url) return;
  document.getElementById('stMsg').innerHTML='<div class="smsg">กำลังทดสอบ...</div>';
  try { var r=await fetch(url+'?action=getOrders'); await r.json(); document.getElementById('stMsg').innerHTML='<div class="smsg ok">✅ เชื่อมต่อสำเร็จ!</div>'; document.getElementById('qrSec').style.display='block'; }
  catch(e){ document.getElementById('stMsg').innerHTML='<div class="smsg err">❌ ไม่สามารถเชื่อมต่อได้</div>'; }
}

function genQR() {
  var base=document.getElementById('appUrl').value.trim(); if(!base){alert('กรุณาใส่ URL ก่อน');return;}
  var h=''; for(var i=1;i<=6;i++) h+='<div class="qritem"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data='+encodeURIComponent(base+'?table='+i)+'" /><div class="qrlabel">โต๊ะ '+i+'</div></div>';
  document.getElementById('qrGrid').innerHTML=h;
}
