window.onload = function() {
  var params = new URLSearchParams(window.location.search);
  tableNum = params.get('table') || '';
  var isStaff = params.get('staff') === '1';
  if (isStaff) { document.getElementById('tabBar').style.display='none'; showTab('staff'); }
  else if (tableNum) { document.getElementById('tabBar').style.display='none'; showTab('customer'); }
  document.getElementById('tableBadge').textContent = tableNum ? 'โต๊ะ ' + tableNum : 'โต๊ะ —';
  document.getElementById('sheetUrl').value = scriptUrl;
  if (scriptUrl) document.getElementById('qrSection').style.display = 'block';
  renderAllMenus();
};

function showTab(tab) {
  document.getElementById('customerView').style.display = tab==='customer' ? 'block' : 'none';
  document.getElementById('staffView').style.display = tab==='staff' ? 'block' : 'none';
  document.getElementById('setupView').style.display = tab==='setup' ? 'block' : 'none';
  var btns = document.querySelectorAll('.tab-btn');
  var tabs = ['customer','staff','setup'];
  for (var i=0; i<btns.length; i++) btns[i].classList.toggle('active', tabs[i]===tab);
  if (tab==='staff') startStaffPolling(); else stopStaffPolling();
}

function renderAllMenus() {
  var nav = document.getElementById('catNav');
  var navHtml = '';
  for (var i=0; i<CATEGORIES.length; i++) {
    navHtml += '<button class="cat-nav-btn' + (i===0?' active':'') + '" onclick="scrollToCategory(\'' + CATEGORIES[i].key + '\')" id="navbtn_' + CATEGORIES[i].key + '">' + CATEGORIES[i].emoji + ' ' + CATEGORIES[i].key + '</button>';
  }
  nav.innerHTML = navHtml;

  var container = document.getElementById('menuContainer');
  var html = '';
  for (var c=0; c<CATEGORIES.length; c++) {
    var cat = CATEGORIES[c];
    html += '<div class="section-title" id="cat_' + cat.key + '">' + cat.emoji + ' ' + cat.key + '</div>';
    html += '<div class="menu-grid">';
    for (var j=0; j<cat.items.length; j++) {
      var item = null;
      for (var k=0; k<MENU.length; k++) { if (MENU[k].id===cat.items[j]) { item=MENU[k]; break; } }
      if (!item) continue;
      var priceDisplay = item.variants ? item.variants[0].price + '฿ขึ้นไป' : (item.price||0) + '฿';
      html += '<div class="menu-card" onclick="openOption(\'' + item.id + '\')">';
      html += '<div class="menu-emoji">' + item.emoji + '</div>';
      html += '<div class="menu-info"><div class="menu-name">' + item.name + '</div><div class="menu-price">' + priceDisplay + '</div></div>';
      html += '<span class="qty-badge" id="qty_' + item.id + '" style="display:none">0</span>';
      html += '<div class="menu-arrow">›</div></div>';
    }
    html += '</div>';
  }
  container.innerHTML = html;

  window.addEventListener('scroll', function() {
    var current = CATEGORIES[0].key;
    for (var i=0; i<CATEGORIES.length; i++) {
      var el = document.getElementById('cat_' + CATEGORIES[i].key);
      if (el && el.getBoundingClientRect().top <= 100) current = CATEGORIES[i].key;
    }
    var allBtns = document.querySelectorAll('.cat-nav-btn');
    for (var b=0; b<allBtns.length; b++) allBtns[b].classList.remove('active');
    var activeBtn = document.getElementById('navbtn_' + current);
    if (activeBtn) { activeBtn.classList.add('active'); activeBtn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
  });
}

function scrollToCategory(key) {
  var el = document.getElementById('cat_' + key);
  if (el) { var offset = el.getBoundingClientRect().top + window.scrollY - 90; window.scrollTo({top:offset,behavior:'smooth'}); }
  var allBtns = document.querySelectorAll('.cat-nav-btn');
  for (var b=0; b<allBtns.length; b++) allBtns[b].classList.remove('active');
  var btn = document.getElementById('navbtn_' + key);
  if (btn) btn.classList.add('active');
}

function openOption(itemId) {
  var item = null;
  for (var i=0; i<MENU.length; i++) { if (MENU[i].id===itemId) { item=MENU[i]; break; } }
  if (!item) return;
  currentItem = item;
  selectedOptions = {};
  document.getElementById('optionTitle').textContent = item.name;
  var html = '';
  if (item.variants) {
    html += '<div class="option-group"><div class="option-group-title">เลือกแบบ <span style="color:#c0392b">*</span></div><div class="option-choices">';
    for (var v=0; v<item.variants.length; v++) {
      html += '<button class="option-btn" onclick="selectOpt(\'แบบ\',\'' + item.variants[v].label + ' (' + item.variants[v].price + 'บาท)\',this)">' + item.variants[v].label + ' — ' + item.variants[v].price + '฿</button>';
    }
    html += '</div></div>';
  }
  if (item.options) {
    for (var o=0; o<item.options.length; o++) {
      var opt = item.options[o];
      html += '<div class="option-group"><div class="option-group-title">' + opt.group + (opt.required?' <span style="color:#c0392b">*</span>':'') + '</div><div class="option-choices">';
      for (var ch=0; ch<opt.choices.length; ch++) {
        html += '<button class="option-btn" onclick="selectOpt(\'' + opt.group + '\',\'' + opt.choices[ch] + '\',this)">' + opt.choices[ch] + '</button>';
      }
      html += '</div></div>';
    }
  }
  itemQty = 1;
  document.getElementById('itemQty').textContent = '1';
  document.getElementById('optionGroups').innerHTML = html;
  document.getElementById('optionOverlay').classList.add('open');
}

function selectOpt(group, choice, btn) {
  selectedOptions[group] = choice;
  var siblings = btn.closest('.option-choices').querySelectorAll('.option-btn');
  for (var i=0; i<siblings.length; i++) siblings[i].classList.remove('selected');
  btn.classList.add('selected');
}

function closeOption() {
  document.getElementById('optionOverlay').classList.remove('open');
  currentItem = null; selectedOptions = {};
}

function changeItemQty(delta) {
  itemQty = Math.max(1, Math.min(10, itemQty + delta));
  document.getElementById('itemQty').textContent = itemQty;
}

function confirmOption() {
  if (!currentItem) return;
  var required = [];
  if (currentItem.variants) required.push('แบบ');
  if (currentItem.options) for (var i=0; i<currentItem.options.length; i++) if (currentItem.options[i].required) required.push(currentItem.options[i].group);
  for (var r=0; r<required.length; r++) {
    if (!selectedOptions[required[r]]) { alert('กรุณาเลือก: ' + required[r]); return; }
  }
  var optStr = Object.values(selectedOptions).join(', ');
  var cartKey = currentItem.id + '_' + optStr.replace(/[^\w\u0E00-\u0E7F]/g, '_');
  var price = currentItem.price || 0;
  if (currentItem.variants && selectedOptions['แบบ']) {
    var match = selectedOptions['แบบ'].match(/\((\d+)บาท\)/);
    if (match) price = parseInt(match[1]);
  }
  if (!cart[cartKey]) cart[cartKey] = {qty:0, price:price, name:currentItem.name, options:optStr};
  cart[cartKey].qty += itemQty;
  var total = 0;
  for (var k in cart) { if (k.startsWith(currentItem.id + '_')) total += cart[k].qty; }
  var qtyEl = document.getElementById('qty_' + currentItem.id);
  if (qtyEl) { qtyEl.textContent = total; qtyEl.style.display = total > 0 ? 'flex' : 'none'; }
  updateCartBar();
  closeOption();
}

function updateCartBar() {
  var count = 0, total = 0;
  for (var k in cart) { count += cart[k].qty; total += cart[k].qty * cart[k].price; }
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = total;
  document.getElementById('cartBar').classList.toggle('visible', count > 0);
}

function openOrderModal() {
  if (!Object.keys(cart).length) return;
  renderOrderModal();
  document.getElementById('orderOverlay').classList.add('open');
}

function renderOrderModal() {
  var keys = Object.keys(cart);
  var html = '';
  var total = 0;
  for (var i=0; i<keys.length; i++) {
    var k = keys[i];
    var item = cart[k];
    var safeKey = JSON.stringify(k);
    html += '<div class="order-item">';
    html += '<div class="order-item-info">';
    html += '<div class="order-item-name">' + item.name + '</div>';
    if (item.options) html += '<div class="order-item-opt">' + item.options + '</div>';
    html += '<div class="order-item-price">' + (item.qty * item.price) + '฿</div>';
    html += '</div>';
    html += '<div class="order-item-controls">';
    html += '<button class="order-edit-btn minus" onclick="editCartItem(' + safeKey + ',-1)">−</button>';
    html += '<span class="order-qty">' + item.qty + '</span>';
    html += '<button class="order-edit-btn plus" onclick="editCartItem(' + safeKey + ',1)">+</button>';
    html += '<button class="order-edit-btn del" onclick="editCartItem(' + safeKey + ',0)">🗑</button>';
    html += '</div></div>';
    total += item.qty * item.price;
  }
  document.getElementById('modalItems').innerHTML = html;
  document.getElementById('modalTotal').textContent = total + ' บาท';
}
